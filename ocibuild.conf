# To use the OCI Build Service you place a file name ocibuild.conf at the root of your git repo.
# This file, written using the HOCON syntax, will cause a build to automatically be triggered when commits are pushed to your repo.
# The ocibuild.conf file also determines how build service executes the build commands on the source code in your repo.
#
# Build Service Reference: https://confluence.oci.oraclecorp.com/x/7kMZBg
# Where is my build: https://devops.oci.oraclecorp.com/build
# HOCON reference: https://github.com/lightbend/config/blob/master/HOCON.md
# Build Service Slack: #oci_build_svc_users

# Caution, using runnerTag = latest will break the local build of ocibuild.conf,
# for local ocibuild please use the version from above mentioned Build Service Reference
runnerTag = latest
name: oci-cloud-controller-manager
team: OKE
phoneBookId: oracle-kubernetes-engine
description: oci-cloud-controller-manager build for oke
branch: ${BLD_BRANCH}
# Kubernetes Version
k8sVersion: v1.29
version: ${k8sVersion}-${BLD_SHORT_COMMIT_HASH}-${BLD_NUMBER}

# CCM release version
majorVersion: 1
# update minorVersion for feature releases
minorVersion: 6
# update patchVersion for bugfixes and small improvements
patchVersion: 0
ccmVersion: ${k8sVersion}-${majorVersion}.${minorVersion}.${patchVersion}

# fvd-rpm
repo: "odo-artifacts-signed-generic-local"
release: ${BLD_SHORT_COMMIT_HASH}.${BLD_NUMBER}

initialBuildNumber = {
  "master": 1
  "internal": 1
}

releaseBranches: ["master", "release*", "internal"]
triggerOnCommitBranches: ["main", "pull-requests", "master", "internal", "release*"]
bitbucketTag: {"enabled": true, "tagName": ${ccmVersion}-${BLD_NUMBER}, "description": "cloud-provider-oci version "${ccmVersion}-${BLD_NUMBER}}

steps: [
  {
    name: dockerize_ccm
    type: dockerizer
    dockerBuildPwd: "."
    dockerBuildArgs: {
      "COMPONENT": "cloud-provider-oci oci-csi-node-driver"
    }
    images: [
      {
        platform: linux/amd64
        dockerFile: "./Dockerfile"
      },
      {
        platform: linux/arm64
        dockerFile: "./Dockerfile_arm"
      }
    ]
  },
  {
    name: publish_public_docker_ccm
    type: publishdocker
    dependsOn: dockerize_ccm
    repository: odo-docker-signed-local
    imageName: "oke-public-cloud-provider-oci"
    skipOnDryRun: false
  },
  {
    name: dockerize_fvd_hyperkube
    type: dockerizer
    dockerBuildPwd: "."
    dockerBuildArgs: {
      "COMPONENT": "oci-flexvolume-driver cloud-provider-oci oci-csi-node-driver"
    }
    images: [
      {
        platform: linux/amd64
        dockerFile: "./Dockerfile"
      },
      {
        platform: linux/arm64
        dockerFile: "./Dockerfile_arm"
      }
    ]
  },
  {
    name: publish_public_docker_fvd_hyperkube
    type: publishdocker
    dependsOn: dockerize_fvd_hyperkube
    repository: odo-docker-signed-local
    imageName: "oke-public-cloud-provider-oci-fvd"
    # skipOnDryRun: false
  },
  {
    name: build-dirs
    type: make
    makeCommands:
      [
        {target: "build-dirs"}
      ]
    artifacts:
      [
        "**"
      ]
  },
  {
    name: build-fvd
    dependsOn: build-dirs
    type: golang
    runnerImage: build-runner-golang-boring-ssl
    runnerTag: 1.0-BLD-3536.12
    goVersion: 1.22.2
    environment: {"CGO_ENABLED": "1", "GO111MODULE": "on"}
    goCommands:
      [
        {
          command: "build "
          args: "-o dist/oci-flexvolume-driver -ldflags '-X main.version="${version}"' ./cmd/oci-flexvolume-driver"
        }
      ]
    artifacts:
      [
        "**"
      ]
  },
    {
       name: build-fvd-arm
       dependsOn: build-dirs
       type: golang
       runnerImage: build-runner-golang-boring-ssl
       runnerTag: 1.0-BLD-3536.12
       goVersion: 1.22.2
       environment: { "CGO_ENABLED" : "0" , "GO111MODULE" :"on", "GOARCH" : "arm"}
       goCommands:
    [
        {
          command: "build "
          args: "-o dist/arm/oci-flexvolume-driver -ldflags '-X main.version="${version}"-arm' ./cmd/oci-flexvolume-driver"
        }
    ]
       artifacts:
       [
         "**"
       ]
    },
    {
      name: publish_fvd_binary
      type: publishgeneric
      dependsOn: build-fvd
      repository: clusters-dev-generic-local
      runStepOnlyWhen: {variable : ${branch}, values: ${releaseBranches} }
      filesToPublish: [
        "dist/oci-flexvolume-driver"
      ]
      filePathsToPublish: [
        {
          localFile: "dist/oci-flexvolume-driver",
          targetDir: "/cloud-provider-oci/"${BLD_NUMBER}"/amd"
        }
      ]
      skipOnDryRun: false
    },
    {
      name: publish_fvd_binary_arm
      type: publishgeneric
      dependsOn: build-fvd-arm
      repository: clusters-dev-generic-local
      runStepOnlyWhen: {variable : ${branch}, values: ${releaseBranches} }
      filesToPublish: [
        "dist/arm/oci-flexvolume-driver"
      ]
      filePathsToPublish: [
        {
          localFile: "dist/arm/oci-flexvolume-driver",
          targetDir: "/cloud-provider-oci/"${BLD_NUMBER}"/arm"
        }
      ]
      skipOnDryRun: false
    },
  {
    name: build_fvd_rpm_x86_64_el7
    type: make
    platform: "linux/x86_64"
    dependsOn: build-fvd
    makeCommands:
      [
        {
          target: "rpm",
          args: "WORK_DIR='"${BLD_INPUT_DIR}"' FVD_BINARY_PATH='"${BLD_INPUT_DIR}"/dist' VERSION='"${k8sVersion}"' BLD_ARCH=x86 RELEASE='"${release}"'"
        }
      ]
    artifacts:
      [
        "**"
      ]
  },
  {
    name: build_fvd_rpm_x86_64_el8
    type: make
    platform: "linux/x86_64"
    runnerImage: build-runner-make-ol8
    dependsOn: build-fvd
    makeCommands:
      [
        {
          target: "rpm",
          args: "WORK_DIR='"${BLD_INPUT_DIR}"' FVD_BINARY_PATH='"${BLD_INPUT_DIR}"/dist' VERSION='"${k8sVersion}"' BLD_ARCH=x86 RELEASE='"${release}"'"
        }
      ]
    artifacts:
      [
        "**"
      ]
  },
  {
    name: build_fvd_rpm_x86_64_el9
    type: make
    platform: "linux/x86_64"
    runnerImage: build-runner-make-ol9
    dependsOn: build-fvd
    makeCommands:
      [
        {
          target: "rpm",
          args: "WORK_DIR='"${BLD_INPUT_DIR}"' FVD_BINARY_PATH='"${BLD_INPUT_DIR}"/dist' VERSION='"${k8sVersion}"' BLD_ARCH=x86 RELEASE='"${release}"'"
        }
      ]
    artifacts:
      [
        "**"
      ]
  },
  {
    name: build_fvd_rpm_aarch64_el7
    type: make
    platform: "linux/arm64"
    dependsOn: build-fvd-arm
    makeCommands:
      [
        {
          target: "rpm",
          args: "WORK_DIR='"${BLD_INPUT_DIR}"' FVD_BINARY_PATH='"${BLD_INPUT_DIR}"/dist/arm' VERSION='"${k8sVersion}"' BLD_ARCH=aarch64 RELEASE='"${release}"'"
        }
      ]
    artifacts:
      [
        "**"
      ]
  },
  {
    name: build_fvd_rpm_aarch64_el8
    type: make
    platform: "linux/arm64"
    runnerImage: build-runner-make-ol8
    dependsOn: build-fvd-arm
    makeCommands:
      [
        {
          target: "rpm",
          args: "WORK_DIR='"${BLD_INPUT_DIR}"' FVD_BINARY_PATH='"${BLD_INPUT_DIR}"/dist/arm' VERSION='"${k8sVersion}"' BLD_ARCH=aarch64 RELEASE='"${release}"'"
        }
      ]
    artifacts:
      [
        "**"
      ]
  },
  {
    name: build_fvd_rpm_aarch64_el9
    type: make
    platform: "linux/arm64"
    runnerImage: build-runner-make-ol9
    dependsOn: build-fvd-arm
    makeCommands:
      [
        {
          target: "rpm",
          args: "WORK_DIR='"${BLD_INPUT_DIR}"' FVD_BINARY_PATH='"${BLD_INPUT_DIR}"/dist/arm' VERSION='"${k8sVersion}"' BLD_ARCH=aarch64 RELEASE='"${release}"'"
        }
      ]
    artifacts:
      [
        "**"
      ]
  },
  {
    name: publish_rpms
    type: publishgeneric
    dependsOn: [build_fvd_rpm_x86_64_el7, build_fvd_rpm_aarch64_el7, build_fvd_rpm_x86_64_el8, build_fvd_rpm_aarch64_el8, build_fvd_rpm_x86_64_el9, build_fvd_rpm_aarch64_el9]
    repository: ${repo}
    runStepOnlyWhen: {variable : ${branch}, values: ${releaseBranches} }
    filePathsToPublish : [
      {
        localFile: "rpmbuild/RPMS/*/*el7.x86_64.rpm",
        targetDir : /okn/fvd/${k8sVersion}/el7/amd64/
      }
      {
        localFile: "rpmbuild/RPMS/*/*el7.aarch64.rpm",
        targetDir : /okn/fvd/${k8sVersion}/el7/arm64/
      },
      {
        localFile: "rpmbuild/RPMS/*/*el8.x86_64.rpm",
        targetDir : /okn/fvd/${k8sVersion}/el8/amd64/
      }
      {
        localFile: "rpmbuild/RPMS/*/*el8.aarch64.rpm",
        targetDir : /okn/fvd/${k8sVersion}/el8/arm64/
      },      {
        localFile: "rpmbuild/RPMS/*/*el9.x86_64.rpm",
        targetDir : /okn/fvd/${k8sVersion}/el9/amd64/
      }
      {
        localFile: "rpmbuild/RPMS/*/*el9.aarch64.rpm",
        targetDir : /okn/fvd/${k8sVersion}/el9/arm64/
      },
    ]
    skipOnDryRun: false
  },
]
