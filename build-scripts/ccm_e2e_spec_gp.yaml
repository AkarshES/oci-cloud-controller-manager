version: 0.1
component: general-purpose
timeoutInSeconds: 120
failImmediatelyOnError: true

env:
  variables:
    bitbucketSecretId: "ocid1.vaultsecret.oc1.phx.amaaaaaaod2gdkyaggvhamrjlptevxon63y2dsl3rcbt446gxjzam72adgpa"
    E2E_BRANCH: "release-1.29"
  vaultVariables:
    "ARTIFACTORY_ACCESS_TOKEN": "ocid1.vaultsecret.oc1.iad.amaaaaaa34hgvtyat6umms6niu4p4yq4ws6gwuwtg7y4czoeufyjj6sjb44a"
  exportedVariables:
    OCI_TRIGGER_COMMIT_HASH: $OCI_TRIGGER_SOURCE_BRANCH_NAME
    OCI_TRIGGER_SOURCE_BRANCH_NAME: $OCI_TRIGGER_SOURCE_BRANCH_NAME
steps:
  - type: Command
    name: Check Basic details
    command: |
      echo "login to bitbucket"
      echo "build version is: $BLD_VERSION"
      bitbucket login --access-key-secret-id ${bitbucketSecretId}
      git clone --depth 1 --single-branch --branch ${E2E_BRANCH} ssh://git@bitbucket.oci.oraclecorp.com:7999/oke/oci-cloud-controller-manager.git
      git fetch origin/${E2E_BRANCH} && git checkout origin/${E2E_BRANCH}
      rm -rf .git && export base=$(basename $$PWD) && echo $$base && cd .. && tar -zcf oci-cloud-controller-manager-v${CCM_RELEASE_VERSION_E2E}-${OCI_TRIGGER_COMMIT_HASH}.tar.gz $$base && mkdir -p $$base && cp oci-cloud-controller-manager-v${CCM_RELEASE_VERSION_E2E}-${OCI_TRIGGER_COMMIT_HASH}.tar.gz $$base/
      curl -H "Authorization: Bearer ${ARTIFACTORY_ACCESS_TOKEN}" -T gp-stage-file-update.txt https://artifactory.oci.oraclecorp.com/odo-docker-signed-local/oke-public-cloud-provider-oci-e2e-v${CCM_RELEASE_VERSION_E2E}-${OCI_TRIGGER_COMMIT_HASH}.tar.gz
    failImmediatelyOnError: true
    timeoutInSeconds: 300
