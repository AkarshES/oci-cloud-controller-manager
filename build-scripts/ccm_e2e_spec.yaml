version: 0.1
component: test
timeoutInSeconds: 25000
failImmediatelyOnError: true

env:
  variables:
    OCI_LBRGNSUBNET: ocid1.subnet.oc1.phx.aaaaaaaa5rdyws4w3g3dppzynq6oyl2ridtlnd4i5pko3aejudm3wdh5ym4q
    OCI_RGNSUBNET: ocid1.subnet.oc1.phx.aaaaaaaadk6nf6yyxg6ivhrnfgrs2d546xxtls3bwlx3tkpeye7c4ji2z4kq
    OCI_NODESUBNET_AMD: ocid1.subnet.oc1.phx.aaaaaaaadk6nf6yyxg6ivhrnfgrs2d546xxtls3bwlx3tkpeye7c4ji2z4kq
    OCI_NODESUBNET_ARM: ocid1.subnet.oc1.phx.aaaaaaaadk6nf6yyxg6ivhrnfgrs2d546xxtls3bwlx3tkpeye7c4ji2z4kq
    POD_SUBNET: ocid1.subnet.oc1.phx.aaaaaaaadk6nf6yyxg6ivhrnfgrs2d546xxtls3bwlx3tkpeye7c4ji2z4kq
    POD_SUBNET_AMD: ocid1.subnet.oc1.phx.aaaaaaaadk6nf6yyxg6ivhrnfgrs2d546xxtls3bwlx3tkpeye7c4ji2z4kq
    POD_SUBNET_ARM: ocid1.subnet.oc1.phx.aaaaaaaadk6nf6yyxg6ivhrnfgrs2d546xxtls3bwlx3tkpeye7c4ji2z4kq
    POD_SUBNET_DUAL_STACK: ocid1.subnet.oc1.phx.aaaaaaaadk6nf6yyxg6ivhrnfgrs2d546xxtls3bwlx3tkpeye7c4ji2z4kq
    POD_SUBNET_IPV6: ocid1.subnet.oc1.phx.aaaaaaaadk6nf6yyxg6ivhrnfgrs2d546xxtls3bwlx3tkpeye7c4ji2z4kq
    OCI_K8SSUBNET: ocid1.subnet.oc1.phx.aaaaaaaabytz7q26sbtkv2bfwrkckfgaq4gqgpxri6vanekwecbvfk5v7bra
    OCI_REGION: us-phoenix-1
    OCI_TENANCY: ocid1.tenancy.oc1..aaaaaaaajol5woa4is3merb234fy4b46bps2nsjr3lcz7rvgj25dr5dxfmnq
    OCI_USER: ocid1.user.oc1..aaaaaaaa6sztipmbkosybj7wcwdybdbuactz4gj37axo45axftftlcwjpdfa
    OCI_FINGERPRINT: ce:5d:fd:a2:60:13:83:86:70:52:5d:bb:fd:0d:c4:48
    OCI_KEY: %
    SOPS_OCI_KEY: %
    PUB_SSHKEY: ssh-rsa  e2e_user@oracle.com
    HOME_LOC: /opt/tssagent/workspace
    TMPDIR: /opt/tssagent/workspace/ccm_e2e/tempdir
    DOCKER_CONFIG_DIR: /opt/tssagent/workspace/ccm_e2e/work
    DIND_NAME: ccm-e2e-test

steps:
  - type: shell
    name: Check Basic details
    command: |
      echo "Running instance: `hostname -I`"
      echo "Printing Disk usage: `df -h`"
      echo "TMPDIR: ${TMPDIR}"
      echo "DOCKER_CONFIG_DIR: ${DOCKER_CONFIG_DIR}"
    failImmediatelyOnError: true
    timeoutInSeconds: 300

  - type: shell
    name: Pre Test Cleanup
    command: |
      docker rm -f ccm-e2e-test
      rm -rf ${HOME_LOC}/ccm_e2e
      mkdir -p ${HOME_LOC}/ccm_e2e || exit
      echo "Cleaning up working directory"
    failImmediatelyOnError: false
    timeoutInSeconds: 600

  - type: shell
    name: Get CCM Repo
    command: |
      cd ccm_e2e
      git clone ssh://git@bitbucket.oci.oraclecorp.com:7999/oke/oci-cloud-controller-manager.git || exit
      cd oci-cloud-controller-manager/ || exit
      git checkout ${E2E_BRANCH} || exit
      git status
    failImmediatelyOnError: true
    timeoutInSeconds: 1200

  - type: shell
    name: Start Docker-in-Docker
    command: |
      mkdir -p ${TMPDIR} ${DOCKER_CONFIG_DIR}
      [[ $(docker ps -f "name=$DIND_NAME" --format '{{.Names}}') == $DIND_NAME ]] || docker --config $DOCKER_CONFIG_DIR run -t --privileged --net=host -v $DOCKER_CONFIG_DIR:/root/.docker -v $TMPDIR:/var/lib/docker --name $DIND_NAME -d iad.ocir.io/odx-oke/oke/dind:0.2.0
      docker ps -a
    failImmediatelyOnError: true
    timeoutInSeconds: 600
    onFailure:
      - type: shell
        command: |
          docker rm -f ccm-e2e-test
          sudo rm -rf ${HOME_LOC}/ccm_e2e
        timeoutInSeconds: 400

  - type: shell
    name: Run test
    command: |
      echo "Running CCM E2E Test"
      cd ccm_e2e/oci-cloud-controller-manager
      export env_file=$(mktemp)
      env > $env_file
      ./build-scripts/run_dind.sh run-ccm-e2e-tests-local
    failImmediatelyOnError: true
    timeoutInSeconds: 3600
    onFailure:
      - type: shell
        command: |
          docker rm -f ccm-e2e-test
          sudo rm -rf ${HOME_LOC}/ccm_e2e
        timeoutInSeconds: 400
