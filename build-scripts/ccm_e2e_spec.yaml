version: 0.1
component: test
timeoutInSeconds: 25000
failImmediatelyOnError: true

env:
  variables:
    OCI_KEY: 
    PUB_SSHKEY: ssh-rsa  e2e_user@oracle.com
    HOME_LOC: /opt/tssagent/workspace
    TMPDIR: /opt/tssagent/workspace/ccm_e2e/tempdir
    DOCKER_CONFIG_DIR: /opt/tssagent/workspace/ccm_e2e/work
    DIND_NAME: ccm-e2e-test

steps:
  - type: shell
    name: Pre Test Cleanup
    command: |
      echo "Running instance: `hostname -I`"
      echo "Printing Disk usage: `df -h`"
      sudo rm -rf ${HOME_LOC}/ccm_e2e-${HOME_LOC}
      mkdir -p ${HOME_LOC}/ccm_e2e || exit
      echo "Cleaning up working directory"
    failImmediatelyOnError: false
    timeoutInSeconds: 600

  - type: shell
    name: Get CCM Repo
    command: |
      cd ccm_e2e
      echo "https://artifactory.oci.oraclecorp.com/clusters-dev-generic-local/oci-cloud-controller-manager-e2e/${CCM_RELEASE_VERSION_E2E}/oci-cloud-controller-manager-${BLD_VERSION}.tar.gz"
      sudo curl -O "https://artifactory.oci.oraclecorp.com/clusters-dev-generic-local/oci-cloud-controller-manager-e2e/${CCM_RELEASE_VERSION_E2E}/oci-cloud-controller-manager-${BLD_VERSION}.tar.gz"
      sudo tar -xf oci-cloud-controller-manager-${BLD_VERSION}.tar.gz
      echo "Downloaded and extracted CCM E2E code from Artifactory"
    failImmediatelyOnError: true
    timeoutInSeconds: 1200

  - type: shell
    name: Run test
    command: |
      echo "Running CCM E2E Test"
      mkdir -p ${TMPDIR} ${DOCKER_CONFIG_DIR}
      cd ${DOCKER_CONFIG_DIR} && pwd
      cd /opt/tssagent/workspace/ccm_e2e/sparta/input/oci-cloud-controller-manager
      export env_file=$(mktemp)
      unset OCI_RESOURCE_PRINCIPAL_PRIVATE_PEM
      unset TMPDIR
      sudo chmod 777 $env_file
      env > $env_file
      ./run_dind.sh run-ccm-e2e-tests-local
    failImmediatelyOnError: true
    timeoutInSeconds: 43200
    onFailure:
      - type: shell
        command: |
          docker rm -f ccm-e2e-test
          sudo rm -rf ${HOME_LOC}/ccm_e2e
        timeoutInSeconds: 400
