steps:
  - type: shell
    name: downloadE2eCode
    command: |
      cd ${OCI_ARTIFACTS_DIR}
      curl -O https://pipelines.artifactory.us-phoenix-1.oci.oracleiaas.com/odo-docker-signed-local/oke-public-cloud-provider-oci-e2e-v${BLD_VERSION}.tar.gz
    timeoutInSeconds: 3000
  - type: shell
    name: Check Basic details
    command: |
      echo "Running instance: `hostname -I`"
      echo "Printing Disk usage: `df -h`"
      echo "TMPDIR: ${TMPDIR}"
      echo "DOCKER_CONFIG_DIR: ${DOCKER_CONFIG_DIR}"
      yum -y install tree
      tree -a -L 2
      echo ${OCI_ARTIFACTS_DIR}
      ls -lh ${OCI_ARTIFACTS_DIR}
      ls -lh /oci-cloud-controller-manager-e2e/
    failImmediatelyOnError: true
    timeoutInSeconds: 300

